name: "Keep Supabase Alive"

on:
  schedule:
    # Se ejecuta todos los días a las 00:00 UTC para garantizar actividad constante
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Database
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/?apikey=${{ secrets.SUPABASE_SERVICE_ROLE }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE }}"
